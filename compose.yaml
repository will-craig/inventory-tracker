services:
  InventoryDatabase:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: InventoryDatabase
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "localhost:27017", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  stockpile-api:
    build:
      context: .
      dockerfile: Stockpile.Api/Dockerfile
    profiles:
      - api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      DatabaseConfig__ConnectionString: mongodb://admin:secret@InventoryDatabase:27017/?authSource=admin
      DatabaseConfig__DatabaseName: InventoryDatabase
    depends_on:
      InventoryDatabase:
        condition: service_healthy
    restart: unless-stopped

  mongo-express:
    image: mongo-express:latest
    profiles:
      - tools
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: secret
      ME_CONFIG_MONGODB_SERVER: InventoryDatabase
    depends_on:
      InventoryDatabase:
        condition: service_healthy
      
volumes:
  mongo_data: